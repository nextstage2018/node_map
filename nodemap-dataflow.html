<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NodeMap - システム全体データフロー図</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif; background: #0f172a; color: #e2e8f0; overflow: hidden; }

/* ===== Top Bar ===== */
.topbar { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; padding: 0 16px; z-index: 100; gap: 16px; }
.topbar h1 { font-size: 15px; font-weight: 600; color: #f8fafc; white-space: nowrap; }
.topbar .sep { color: #475569; }
.legend { display: flex; gap: 14px; font-size: 12px; color: #94a3b8; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }
.zoom-controls { margin-left: auto; display: flex; gap: 4px; }
.zoom-controls button { background: #334155; border: 1px solid #475569; color: #e2e8f0; width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-size: 14px; }
.zoom-controls button:hover { background: #475569; }

/* ===== Canvas ===== */
.canvas-wrap { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; }
.canvas-wrap.grabbing { cursor: grabbing; }
.canvas { position: absolute; transform-origin: 0 0; }

/* ===== Nodes ===== */
.node { position: absolute; border-radius: 10px; padding: 10px 14px; cursor: pointer; transition: box-shadow 0.2s, transform 0.15s; user-select: none; min-width: 120px; }
.node:hover { transform: scale(1.04); z-index: 10; }
.node-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; display: flex; align-items: center; gap: 5px; }
.node-sub { font-size: 10px; opacity: 0.8; line-height: 1.4; }
.node-badge { font-size: 9px; background: rgba(255,255,255,0.15); padding: 1px 6px; border-radius: 8px; margin-top: 4px; display: inline-block; }

/* Node types */
.node-external { background: linear-gradient(135deg, #1e3a5f, #1e293b); border: 1.5px solid #3b82f6; }
.node-page { background: linear-gradient(135deg, #1a2e1a, #1e293b); border: 1.5px solid #22c55e; }
.node-page:hover { box-shadow: 0 0 20px rgba(34,197,94,0.3); }
.node-store { background: linear-gradient(135deg, #2d1b4e, #1e293b); border: 1.5px solid #a855f7; }
.node-store:hover { box-shadow: 0 0 20px rgba(168,85,247,0.3); }
.node-cron { background: linear-gradient(135deg, #3b2a1a, #1e293b); border: 1.5px solid #f59e0b; }
.node-cron:hover { box-shadow: 0 0 20px rgba(245,158,11,0.3); }
.node-ai { background: linear-gradient(135deg, #1a2a3b, #1e293b); border: 1.5px solid #06b6d4; }
.node-ai:hover { box-shadow: 0 0 20px rgba(6,182,212,0.3); }
.node-google { background: linear-gradient(135deg, #2a1a1a, #1e293b); border: 1.5px solid #ef4444; }
.node-google:hover { box-shadow: 0 0 20px rgba(239,68,68,0.3); }

/* ===== SVG Arrows ===== */
svg.arrows { position: absolute; top: 0; left: 0; pointer-events: none; }
svg.arrows path { fill: none; stroke-width: 1.8; }
svg.arrows .arrow-user { stroke: #22c55e; opacity: 0.5; }
.arrow-user-label { fill: #22c55e; font-size: 9px; }
svg.arrows .arrow-auto { stroke: #f59e0b; opacity: 0.5; stroke-dasharray: 6 3; }
.arrow-auto-label { fill: #f59e0b; font-size: 9px; }
svg.arrows .arrow-ai { stroke: #06b6d4; opacity: 0.5; stroke-dasharray: 3 3; }
.arrow-ai-label { fill: #06b6d4; font-size: 9px; }
svg.arrows .arrow-sync { stroke: #a855f7; opacity: 0.5; }
.arrow-sync-label { fill: #a855f7; font-size: 9px; }
svg.arrows marker path { stroke: none; }

/* ===== Detail Panel ===== */
.panel { position: fixed; top: 48px; right: -420px; width: 420px; bottom: 0; background: #1e293b; border-left: 1px solid #334155; transition: right 0.3s; z-index: 50; overflow-y: auto; padding: 20px; }
.panel.open { right: 0; }
.panel-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; }
.panel h2 { font-size: 16px; font-weight: 700; margin-bottom: 12px; padding-right: 30px; }
.panel h3 { font-size: 13px; font-weight: 600; color: #94a3b8; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.panel p, .panel li { font-size: 13px; line-height: 1.6; color: #cbd5e1; }
.panel ul { padding-left: 18px; }
.panel .tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 6px; margin: 2px 2px 2px 0; }
.tag-table { background: #3b1f6e; color: #c4b5fd; }
.tag-api { background: #1e3a5f; color: #93c5fd; }
.tag-page { background: #14532d; color: #86efac; }

/* ===== Zone Labels ===== */
.zone-label { position: absolute; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.08); letter-spacing: 2px; text-transform: uppercase; pointer-events: none; }

/* ===== Filter ===== */
.filter-bar { display: flex; gap: 6px; }
.filter-btn { font-size: 11px; padding: 3px 10px; border-radius: 12px; border: 1px solid #475569; background: transparent; color: #94a3b8; cursor: pointer; }
.filter-btn.active { background: #334155; color: #f8fafc; border-color: #64748b; }

/* ===== Minimap ===== */
.minimap { position: fixed; bottom: 12px; right: 12px; width: 200px; height: 130px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; z-index: 60; overflow: hidden; }
.minimap-viewport { position: absolute; border: 1.5px solid #3b82f6; background: rgba(59,130,246,0.1); pointer-events: none; }
.minimap canvas { width: 100%; height: 100%; }
</style>
</head>

const SCALE_NODE = 2.2;

// Create nodes
NODES.forEach(n => {
  const el = document.createElement('div');
  el.className = `node node-${n.type}`;
  el.id = `node-${n.id}`;
  el.style.left = (n.x * SCALE_NODE) + 'px';
  el.style.top = (n.y * SCALE_NODE) + 'px';
  el.innerHTML = `
    <div class="node-title">${n.icon} ${n.title}</div>
    <div class="node-sub">${n.sub.replace(/\n/g, '<br>')}</div>
  `;
  el.addEventListener('click', (e) => { e.stopPropagation(); showPanel(n); });
  canvas.appendChild(el);

// Draw arrows
function getNodeCenter(id) {
  const el = document.getElementById(`node-${id}`);
  if (!el) return { x: 0, y: 0 };
  const r = el.getBoundingClientRect();
  const cx = parseFloat(el.style.left) + el.offsetWidth / 2;
  const cy = parseFloat(el.style.top) + el.offsetHeight / 2;
  return { x: cx, y: cy };
}

function getNodeEdge(fromId, toId) {
  const fromEl = document.getElementById(`node-${fromId}`);
  const toEl = document.getElementById(`node-${toId}`);
  if (!fromEl || !toEl) return { fx: 0, fy: 0, tx: 0, ty: 0 };

  const f = { x: parseFloat(fromEl.style.left), y: parseFloat(fromEl.style.top), w: fromEl.offsetWidth, h: fromEl.offsetHeight };
  const t = { x: parseFloat(toEl.style.left), y: parseFloat(toEl.style.top), w: toEl.offsetWidth, h: toEl.offsetHeight };

  const fcx = f.x + f.w / 2, fcy = f.y + f.h / 2;
  const tcx = t.x + t.w / 2, tcy = t.y + t.h / 2;

  const dx = tcx - fcx, dy = tcy - fcy;
  const angle = Math.atan2(dy, dx);

  // from edge
  let fx, fy;
  if (Math.abs(Math.cos(angle)) * f.h > Math.abs(Math.sin(angle)) * f.w) {
    fx = fcx + (Math.cos(angle) > 0 ? f.w / 2 : -f.w / 2);
    fy = fcy + Math.tan(angle) * (Math.cos(angle) > 0 ? f.w / 2 : -f.w / 2);
  } else {
    fy = fcy + (Math.sin(angle) > 0 ? f.h / 2 : -f.h / 2);
    fx = fcx + (1 / Math.tan(angle)) * (Math.sin(angle) > 0 ? f.h / 2 : -f.h / 2);
  }

  // to edge
  let tx, ty;
  const angle2 = angle + Math.PI;
  if (Math.abs(Math.cos(angle2)) * t.h > Math.abs(Math.sin(angle2)) * t.w) {
    tx = tcx + (Math.cos(angle2) > 0 ? t.w / 2 : -t.w / 2);
    ty = tcy + Math.tan(angle2) * (Math.cos(angle2) > 0 ? t.w / 2 : -t.w / 2);
  } else {
    ty = tcy + (Math.sin(angle2) > 0 ? t.h / 2 : -t.h / 2);
    tx = tcx + (1 / Math.tan(angle2)) * (Math.sin(angle2) > 0 ? t.h / 2 : -t.h / 2);
  }

  return { fx, fy, tx, ty };
}

function drawEdges() {
  // markers
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  ['#22c55e', '#f59e0b', '#06b6d4', '#a855f7'].forEach((color, i) => {
    const names = ['user', 'auto', 'ai', 'sync'];
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker.setAttribute('id', `arrow-${names[i]}`);
    marker.setAttribute('viewBox', '0 0 10 6');
    marker.setAttribute('refX', '10');
    marker.setAttribute('refY', '3');
    marker.setAttribute('markerWidth', '8');
    marker.setAttribute('markerHeight', '6');
    marker.setAttribute('orient', 'auto');
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', 'M0,0 L10,3 L0,6 Z');
    p.setAttribute('fill', color);
    marker.appendChild(p);
    defs.appendChild(marker);
  });
  svgEl.appendChild(defs);

  EDGES.forEach(e => {
    const { fx, fy, tx, ty } = getNodeEdge(e.from, e.to);
    const mx = (fx + tx) / 2, my = (fy + ty) / 2;
    const dx = tx - fx, dy = ty - fy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    // curve offset
    const offx = -dy * 0.15, offy = dx * 0.15;
    const cx1 = mx + offx, cy1 = my + offy;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${fx},${fy} Q${cx1},${cy1} ${tx},${ty}`);
    path.setAttribute('class', `arrow-${e.type}`);
    path.setAttribute('marker-end', `url(#arrow-${e.type})`);
    path.setAttribute('data-from', e.from);
    path.setAttribute('data-to', e.to);
    svgEl.appendChild(path);

    // label
    if (e.label && dist > 80) {
      const lx = fx * 0.25 + cx1 * 0.5 + tx * 0.25;
      const ly = fy * 0.25 + cy1 * 0.5 + ty * 0.25;
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', lx);
      text.setAttribute('y', ly - 4);
      text.setAttribute('class', `arrow-${e.type}-label`);
      text.setAttribute('text-anchor', 'middle');
      text.textContent = e.label;
      svgEl.appendChild(text);
    }
  });
}

// Delay to let nodes render
requestAnimationFrame(() => { requestAnimationFrame(drawEdges); });

// ========== Panel ==========
function showPanel(node) {
  const d = node.detail;
  let html = `<h2>${node.icon} ${node.title}</h2>`;
  html += `<p>${d.desc}</p>`;

  if (d.tables && d.tables.length) {
    html += `<h3>テーブル</h3>`;
    html += d.tables.map(t => `<span class="tag tag-table">${t}</span>`).join(' ');
  }
  if (d.apis && d.apis.length) {
    html += `<h3>API</h3>`;
    html += d.apis.map(a => `<span class="tag tag-api">${a}</span>`).join(' ');
  }
  if (d.flows && d.flows.length) {
    html += `<h3>データフロー</h3><ul>`;
    html += d.flows.map(f => `<li>${f}</li>`).join('');
    html += `</ul>`;
  }

  // Find related edges
  const related = EDGES.filter(e => e.from === node.id || e.to === node.id);
  if (related.length) {
    html += `<h3>接続 (${related.length})</h3><ul>`;
    related.forEach(e => {
      const dir = e.from === node.id ? '→' : '←';
      const other = e.from === node.id ? e.to : e.from;
      const otherNode = NODES.find(n => n.id === other);
      const typeLabel = { user: '操作', auto: '自動', ai: 'AI', sync: '同期' }[e.type];
      html += `<li>${dir} ${otherNode ? otherNode.icon + ' ' + otherNode.title : other} <span class="tag tag-api">${typeLabel}: ${e.label || ''}</span></li>`;
    });
    html += `</ul>`;
  }

  panelContent.innerHTML = html;
  panel.classList.add('open');

  // Highlight edges
  svgEl.querySelectorAll('path').forEach(p => p.style.opacity = '');
  svgEl.querySelectorAll('path').forEach(p => {
    const f = p.getAttribute('data-from'), t = p.getAttribute('data-to');
    if (f === node.id || t === node.id) {
      p.style.opacity = '1';
      p.style.strokeWidth = '3';
    } else if (f && t) {
      p.style.opacity = '0.1';
      p.style.strokeWidth = '';
    }
  });
}

document.getElementById('panelClose').addEventListener('click', () => {
  panel.classList.remove('open');
  svgEl.querySelectorAll('path').forEach(p => { p.style.opacity = ''; p.style.strokeWidth = ''; });
});

let scale = 0.45, panX = 50, panY = 20;
let isPanning = false, startX, startY;

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  updateMinimap();
}
applyTransform();

wrap.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node')) return;
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
  wrap.classList.add('grabbing');
});
window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  applyTransform();
});
window.addEventListener('mouseup', () => { isPanning = false; wrap.classList.remove('grabbing'); });

wrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const wx = (mx - panX) / scale, wy = (my - panY) / scale;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.15, Math.min(2.5, scale * delta));
  panX = mx - wx * scale;
  panY = my - wy * scale;
  applyTransform();
}, { passive: false });

document.getElementById('zoomIn').addEventListener('click', () => { scale = Math.min(2.5, scale * 1.2); applyTransform(); });
document.getElementById('zoomOut').addEventListener('click', () => { scale = Math.max(0.15, scale / 1.2); applyTransform(); });
document.getElementById('zoomReset').addEventListener('click', () => { scale = 0.45; panX = 50; panY = 20; applyTransform(); });

// ========== Filter ==========
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;
    document.querySelectorAll('.node').forEach(n => {
      if (filter === 'all' || n.classList.contains(filter)) {
        n.style.opacity = '1';
        n.style.pointerEvents = '';
      } else {
        n.style.opacity = '0.15';
        n.style.pointerEvents = 'none';
      }
    });
    // Dim edges
    svgEl.querySelectorAll('path[data-from]').forEach(p => {
      if (filter === 'all') { p.style.opacity = ''; return; }
      const fromEl = document.getElementById(`node-${p.getAttribute('data-from')}`);
      const toEl = document.getElementById(`node-${p.getAttribute('data-to')}`);
      if ((fromEl && fromEl.classList.contains(filter)) || (toEl && toEl.classList.contains(filter))) {
        p.style.opacity = '0.6';
      } else {
        p.style.opacity = '0.05';
      }
    });
  });
});

// ========== Minimap ==========
function updateMinimap() {
  const mc = document.getElementById('minimapCanvas');
  const ctx = mc.getContext('2d');
  const mw = 200, mh = 130;
  const totalW = CW * SCALE_NODE, totalH = CH * SCALE_NODE;
  const sx = mw / totalW, sy = mh / totalH;
  const s = Math.min(sx, sy);

  ctx.clearRect(0, 0, mw, mh);

  // Draw nodes
  const colors = { external: '#3b82f6', page: '#22c55e', store: '#a855f7', cron: '#f59e0b', ai: '#06b6d4', google: '#ef4444' };
  NODES.forEach(n => {
    ctx.fillStyle = colors[n.type] || '#888';
    ctx.fillRect(n.x * SCALE_NODE * s, n.y * SCALE_NODE * s, 8, 5);
  });

  // Viewport
  const vp = document.getElementById('minimapViewport');
  const wrapRect = wrap.getBoundingClientRect();
  const vpLeft = (-panX / scale) * s;
  const vpTop = (-panY / scale) * s;
  const vpW = (wrapRect.width / scale) * s;
  const vpH = (wrapRect.height / scale) * s;
  vp.style.left = Math.max(0, vpLeft) + 'px';
  vp.style.top = Math.max(0, vpTop) + 'px';
  vp.style.width = Math.min(mw, vpW) + 'px';
  vp.style.height = Math.min(mh, vpH) + 'px';
}

// Close panel on canvas click
wrap.addEventListener('click', (e) => {
  if (!e.target.closest('.node')) {
    panel.classList.remove('open');
    svgEl.querySelectorAll('path').forEach(p => { p.style.opacity = ''; p.style.strokeWidth = ''; });
  }
});
</script>
